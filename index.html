<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        nav {
            margin-bottom: 24px;
        }
        nav a {
            color: #333;
            text-decoration: none;
            margin: 0 10px;
            font-weight: 600;
        }
        nav a:hover,
        nav a:focus-visible {
            text-decoration: underline;
        }
        section {
            margin: 36px 0;
        }
        h1 { color: #333; }
        p { color: #666; line-height: 1.6; }
    </style>
</head>
<body>
    <nav aria-label="Primary">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>

    <section id="home">
        <h1>Hello, World!</h1>
        <p>This is my first website hosted on GitHub Pages.</p>
        <p>Welcome to my page!</p>
    </section>

    <section id="about">
        <h1>About</h1>
        <p>Add a short description about yourself or this website here.</p>
    </section>

    <section id="contact">
        <h1>Contact</h1>
        <p>You can add your email, social links, or a contact form here.</p>
    </section>
</body>
</html>
